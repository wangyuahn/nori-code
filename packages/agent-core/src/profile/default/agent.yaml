name: agent
description: Default Nori Code agent

systemPromptPath: ./system.md
promptVars:
  roleAdditional: ''

tools_readonly: true

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - TaskList
  - TaskOutput
  - TaskStop
  - CronCreate
  - CronList
  - CronDelete
  - ReadMediaFile
  - TodoList
  - Skill
  - WebSearch
  - AgentSwarm
  - AgentSwarmControl
  - Agent
  - FetchURL
  - Browser
  - AskUserQuestion
  - EnterPlanMode
  - ExitPlanMode
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*
  - nori_memory_search
  - nori_memory_write
  - nori_memory_remove
  - nori_plan_write
  - nori_swarm_launch
  - nori_swarm_status
  - nori_swarm_result
  - nori_ask_parent

subagents:
  orchestrator:
    description: Read-only task orchestrator. Plans and delegates implementation to worker agents.
  coder:
    description: General software engineering worker. Prefer AgentSwarm/orchestrator for delegated work.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
