extends: agent
name: nori-agent
description: Nori Code orchestration agent — hybrid rule-engine + LLM reasoning with Obsidian memory and DAG swarm

systemPromptPath: ./nori-system.md

promptVars:
  roleAdditional: ''

tools_readonly: true

tools:
  - Read
  - Write
  - Edit
  - Grep
  - Glob
  - Bash
  - ReadMediaFile
  - TodoList
  - TaskList
  - TaskOutput
  - TaskStop
  - WebSearch
  - FetchURL
  - Skill
  - EnterPlanMode
  - ExitPlanMode
  - AskUserQuestion
  - AgentSwarm
  - Agent
  - CronCreate
  - CronDelete
  - CronList
  - CreateGoal
  - GetGoal
  - SetGoalBudget
  - UpdateGoal
  - mcp__*
  - nori_memory_search
  - nori_memory_write
  - nori_memory_remove
  - nori_plan_write
  - nori_swarm_launch
  - nori_swarm_status
  - nori_swarm_result
  - nori_ask_parent

subagents:
  nori-coder:
    description: Read-only coding orchestrator. Plans and delegates implementation via AgentSwarm. Does NOT write code directly.
  explore:
    description: Fast codebase exploration with prompt-enforced read-only behavior.
  plan:
    description: Read-only implementation planning and architecture design.
  coder:
    description: General software engineering worker. Legacy direct agent type — prefer AgentSwarm/nori-coder.
